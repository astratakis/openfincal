services:
  openfincal:
    container_name: openfincal
    build:
      context: ./app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/usr/src/app
      - ${CLIENT_SECRET_SHARED_DIRECTORY}:/usr/shared
    environment:
      # Get the current Environment (dev or prod)
      - ENV=${ENV}
      - VERSION=${VERSION}
      - TITLE=${TITLE}
  redis:
    image: redis:latest
    container_name: redis
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - ${REDIS_STORAGE_DIRECTORY}:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  openfincal-postgres:
    image: postgres:latest
    container_name: openfincal-postgres
    volumes:
      - ${POSTGRES_DATABASE_DIRECTORY}/openfincal:/var/lib/postgresql
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      # Postgres Superuser Configuration
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=openfincal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d openfincal" ]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak-postgres:
    image: postgres:latest
    container_name: keycloak-postgres
    volumes:
      - ${POSTGRES_DATABASE_DIRECTORY}/keycloak:/var/lib/postgresql
    environment:
      # Postgres Superuser Configuration
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_DB=keycloak
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d keycloak" ]
      interval: 5s
      timeout: 3s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database Connection
      - KC_DB=postgres
      - KC_DB_URL=${KC_DB_URL}
      - KC_DB_USERNAME=${POSTGRES_USER}
      - KC_DB_PASSWORD=${POSTGRES_PASSWORD}
      - KC_DB_SCHEMA=public

      # Admin Credentials (Bootstrap)
      - KC_BOOTSTRAP_ADMIN_USERNAME=${KC_BOOTSTRAP_ADMIN_USERNAME}
      - KC_BOOTSTRAP_ADMIN_PASSWORD=${KC_BOOTSTRAP_ADMIN_PASSWORD}

      - KC_HOSTNAME_STRICT_BACKCHANNEL=false
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME=${KC_HOSTNAME}

      # Health and Metrics
      - JDBC_PARAMS='useSsl=false'
      - KC_HTTP_ENABLED=${KC_HTTP_ENABLED}
    command: start-dev
    healthcheck:
      test: [ "CMD-SHELL", "(echo > /dev/tcp/localhost/8080) >/dev/null 2>&1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
