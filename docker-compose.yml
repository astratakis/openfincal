services:
  api:
    build:
      context: ./api
    container_name: openfincal-api
    ports:
      - "${API_PORT}:8000"
    env_file:
      - dev.env
    volumes:
      - ./api/src:/app/src
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: openfincal-frontend
    ports:
      - "${FRONTEND_PORT}:3000"
    env_file:
      - dev.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    restart: unless-stopped
